[project]
name = "gimmegit"
version = "1.0.1.dev0"
description = "A tool for cloning GitHub repos and creating branches."
authors = [
    { name = "Dave Wilding", email = "tech@dpw.me" },
]
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">= 3.10"
dependencies = [
    "gitpython>=3.1,<4",
    "pre-commit>=4.4,<5",
    "PyGithub>=2.9,<3",
    # Dependencies of PyGithub. Specified because of security advisories.
    "PyJWT[crypto]>=2.12.1,<3",
    "requests>=2.33.0,<3",
]

[project.scripts]
gimmegit = "gimmegit._cli:main"

[dependency-groups]
dev = [
    "ruff",
    "pytest",
    "ty>=0.0.17",
    "zizmor",
]

[build-system]
requires = [
    "uv_build>=0.11.3,<0.12",
]
build-backend = "uv_build"

[tool.ruff]
line-length = 99

[tool.ty.environment]
# Help ty resolve local imports in our testing code.
root = [
    "./src",
    "./tests/functional",
    "./tests/stress",
    "./tests/unit",
]
